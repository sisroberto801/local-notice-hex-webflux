# Application Configuration
spring.application.name=notice

# R2DBC Configuration
spring.r2dbc.url=${SPRING_R2DBC_URL}
spring.r2dbc.username=${SPRING_R2DBC_USERNAME}
spring.r2dbc.password=${SPRING_R2DBC_PASSWORD}

# Flyway Configuration
spring.flyway.enabled=true
spring.flyway.baseline-on-migrate=true
spring.flyway.clean-disabled=false
spring.flyway.locations=classpath:db/migration
spring.flyway.url=${SPRING_FLYWAY_URL}
spring.flyway.user=${SPRING_FLYWAY_USER}
spring.flyway.password=${SPRING_FLYWAY_PASSWORD}

# Springdoc / Swagger Configuration
#springdoc.swagger-ui.path=/swagger-ui.html
#springdoc.swagger-ui.enabled=true
#springdoc.swagger-ui.operations-sorter=alpha
#springdoc.swagger-ui.tags-sorter=alpha
#springdoc.swagger-ui.display-request-duration=true
#springdoc.swagger-ui.url=/v3/api-docs.yaml
#springdoc.api-docs.path=/v3/api-docs
#springdoc.api-docs.enabled=true
#springdoc.packages-to-scan=com.hexagonal.notice.infrastructure.controller
#springdoc.paths-to-match=/api/**
springdoc.api-docs.enabled=true
springdoc.swagger-ui.enabled=true
springdoc.swagger-ui.url=/docs/project.swagger.yaml
springdoc.packages-to-scan=com.hexagonal.notice.infrastructure.controller
springdoc.paths-to-match=/api/**

# JWT Configuration
jwt.secret=${JWT_SECRET}
jwt.expiration=${JWT_EXPIRATION}

# Server Configuration
server.port=8080

# Logging Configuration
logging.level.com.hexagonal.notice=DEBUG
logging.level.org.springframework.security=DEBUG
logging.level.io.jsonwebtoken=DEBUG
logging.level.org.springframework.r2dbc=DEBUG
logging.level.io.r2dbc.postgresql=DEBUG
