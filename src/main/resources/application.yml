# Application Configuration
spring:
  application:
    name: notice
  r2dbc:
    url: r2dbc:postgresql://localhost:5432/notice_db
    username: postgres
    password: postgres
  flyway:
    enabled: true
    baseline-on-migrate: true
    clean-disabled: false
    locations: classpath:db/migration
  doc:
    swagger-ui:
      path: /swagger-ui.html
      enabled: true
      operations-sorter: alpha
      tags-sorter: alpha
      display-request-duration: true
    api-docs:
      path: /v3/api-docs
      enabled: true
    webflux:
      openapi:
        enabled: true

# JWT Configuration
jwt:
  secret: mySecretKeyForJWTTokenGenerationThatShouldBeVeryLongAndSecureForProductionUse
  expiration: 300000 # 5 minutes in milliseconds

# Server Configuration
server:
  port: 8080

# Logging Configuration
logging:
  level:
    com.hexagonal.notice: DEBUG
    org.springframework.security: DEBUG
    io.jsonwebtoken: DEBUG
    org.springframework.r2dbc: DEBUG
    io.r2dbc.postgresql: DEBUG
