# R2DBC configuration for reactive database access
spring.r2dbc.url=r2dbc:h2:mem:///testdb;DB_CLOSE_DELAY=-1;CASE_INSENSITIVE_IDENTIFIERS=TRUE
spring.r2dbc.username=sa
spring.r2dbc.password=

spring.flyway.enabled=false

spring.sql.init.mode=always
spring.sql.init.schema-locations=classpath:schema-test.sql

spring.data.r2dbc.repositories.enabled=true
spring.r2dbc.properties.camel-case-to-lower-case=true

logging.level.org.springframework.r2dbc=DEBUG
logging.level.io.r2dbc.h2=DEBUG
logging.level.org.flywaydb=DEBUG